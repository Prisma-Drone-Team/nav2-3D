bt_navigator:
  ros__parameters:
    default_nav_to_pose_bt_xml: "/root/nav3d_sim/ros2_ws/install/nav3d_bt_navigator/share/nav3d_bt_navigator/behavior_trees/navigate_w_replanning_if_path_becomes_invalid_or_goal_is_updated.xml"

planner_server:
  ros__parameters:
    planner_plugins: ["Moveit"]

    Moveit:
      plugin: "nav3d_planner_plugin_moveit/MoveItGlobalPlanner"
      yaw_mode: "directional"

    global_frame: "map"
    robot_base_frame: "base_link"
    transform_tolerance: 0.1

controller_server:
  ros__parameters:
    controller_frequency: 50.0
    waypoint_topic: "offboard/waypoint"

    global_frame: "map"
    robot_base_frame: "base_link"
    transform_tolerance: 0.1

    xyz_goal_tolerance: 0.2
    yaw_goal_tolerance: 0.2

    speed_limit_topic: "speed_limit"
    default_speed_limit: 0.3
    slowdown_distance: 0.3
    min_speed: 0.0

offboard_control:
  ros__parameters:
    control_rate_hz: 50.0
    waypoint_topic: "offboard/waypoint"
    waypoint_timeout_s: 1.0
    offboard_warmup_s: 1.0
    offboard_command_retry_s: 1.0
    takeoff_altitude: 1.0
    altitude_tolerance: 0.1
